name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python3 -m unittest discover tests
      - name: Compile scripts
        run: python3 -m py_compile line_history_poc.py scripts/export-current-line-chat.py
